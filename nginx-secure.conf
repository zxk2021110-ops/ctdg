# ============================================================
# 宠物之家 - nginx 安全加固配置
# ============================================================

# 速率限制：每个IP每秒最多10个请求（防暴力破解/DDoS）
limit_req_zone $binary_remote_addr zone=req_limit:10m rate=10r/s;

# 连接限制：每个IP最多50个并发连接
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    # ---- 隐藏 nginx 版本号 ----
    server_tokens off;

    # ---- 安全响应头 ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---- 速率限制 ----
    limit_req zone=req_limit burst=20 nodelay;
    limit_conn conn_limit 50;

    # ---- 请求体大小限制（静态站不需要大请求体）----
    client_max_body_size 1m;
    client_body_buffer_size 1k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 1k;

    # ---- 超时设置 ----
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 30s;

    # ---- 禁止访问隐藏文件（.env, .git, .htaccess 等）----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ---- 禁止访问备份文件 ----
    location ~* \.(bak|backup|old|orig|save|swp|tmp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ---- 禁止访问配置文件 ----
    location ~* \.(conf|sql|log|ini|sh)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ---- 主站配置 ----
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;

        # 只允许 GET 和 HEAD 方法
        limit_except GET HEAD {
            deny all;
        }

        # 安全响应头（location 级别需要重新添加，否则会被 location 级的 add_header 覆盖）
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    # 静态资源缓存（独立 location，避免继承问题）
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ~* \.(css|js)$ {
        root /usr/share/nginx/html;
        expires 3d;
        add_header Cache-Control "public" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ~* \.(html|htm)$ {
        root /usr/share/nginx/html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    # ---- 禁止爬虫访问（可选，取消注释启用）----
    # location = /robots.txt {
    #     return 200 "User-agent: *\nDisallow: /\n";
    #     add_header Content-Type text/plain;
    # }

    # ---- 错误页面 ----
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    # ---- 速率限制错误返回 503 而非重定向 ----
    error_page 503 @rate_limit;
    location @rate_limit {
        default_type text/html;
        return 429 '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>请求过于频繁</title></head><body style="text-align:center;padding:50px;font-family:sans-serif"><h1>429 Too Many Requests</h1><p>您的请求过于频繁，请稍后再试。</p></body></html>';
    }

    # ---- 访问日志 ----
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log notice;
}
